# ╔══════════════════════════════════════════╗
# ║         Kitty Config - CachyOS KDE      ║
# ╚══════════════════════════════════════════╝

# ── 字体 ──────────────────────────────────
font_family      Maple Mono NF CN
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5
#adjust_line_height  110%
adjust_column_width 0

# Maple Mono NF CN 已内置 Nerd Font 和中文字符，不再需要单独的中文 fallback

# 连字（按需开启，会略微增加渲染开销）
# font_features MesloLGMNerdFontMono-Regular +liga +calt

# ── 透明度 & 模糊 ──────────────────────────
background_opacity         0.85
#background_blur            32
dynamic_background_opacity yes

# ── 光标 ──────────────────────────────────
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 10.0
cursor_beam_thickness  1.5

# ── 滚动 ──────────────────────────────────
scrollback_lines       10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ── 性能 ──────────────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor yes

# ── URL ───────────────────────────────────
url_style           curly
open_url_with       default
url_prefixes        file ftp ftps git http https mailto news sftp ssh
detect_urls         yes
copy_on_select      clipboard

# ── 窗口布局 ──────────────────────────────
hide_window_decorations no
remember_window_size   no
initial_window_width   120c
initial_window_height  32c

window_padding_width   0
window_margin_width    0
single_window_margin_width -1

# 窗口边框（仅多窗口时显示）
draw_minimal_borders yes
window_border_width  1pt
# active_border_color  #89b4fa
# inactive_border_color #45475a

# ── Tab 栏 ────────────────────────────────
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_title_template     "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title[:20]}"
# active_tab_foreground  #1e1e2e
# active_tab_background  #89b4fa
# inactive_tab_foreground #cdd6f4
# inactive_tab_background #313244
# tab_bar_background     #1e1e2e

# ── 布局 ──────────────────────────────────
enabled_layouts splits,tall,fat,grid,stack

# ── 颜色主题：Catppuccin Mocha ─────────────
# foreground              #CDD6F4
# background              #1E1E2E
# selection_foreground    #1E1E2E
# selection_background    #F5E0DC

# 光标
# cursor            #F5E0DC
# cursor_text_color #1E1E2E

# URL 下划线
# url_color #F5E0DC

# 窗口边框
# active_border_color   #B4BEFE
# inactive_border_color #6C7086
# bell_border_color     #F9E2AF

# Tab
# active_tab_foreground   #11111B
# active_tab_background   #CBA6F7
# inactive_tab_foreground #CDD6F4
# inactive_tab_background #181825
# tab_bar_background      #11111B

# 16色
# color0  #45475A
# color1  #F38BA8
# color2  #A6E3A1
# color3  #F9E2AF
# color4  #89B4FA
# color5  #F5C2E7
