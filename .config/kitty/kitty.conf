# ── 快捷键 ────────────────────────────────
kitty_mod ctrl+shift

# ── 窗口导航（与 Neovim 共享，需安装 vim-kitty-navigator）──
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# ── 窗口管理 ──────────────────────────────
map kitty_mod+enter     new_window_with_cwd
map kitty_mod+w         close_window
map kitty_mod+r         start_resizing_window
map kitty_mod+f         move_window_forward
map kitty_mod+]         next_window
map kitty_mod+[         previous_window
map kitty_mod+backslash launch --location=vsplit --cwd=current
map kitty_mod+apostrophe launch --location=hsplit --cwd=current

# 直接调整窗口大小（无需先进入 resize mode）
map kitty_mod+alt+h     resize_window narrower 5
map kitty_mod+alt+l     resize_window wider 5
map kitty_mod+alt+k     resize_window taller 3
map kitty_mod+alt+j     resize_window shorter 3
map kitty_mod+alt+left  resize_window narrower 5
map kitty_mod+alt+right resize_window wider 5
map kitty_mod+alt+up    resize_window taller 3
map kitty_mod+alt+down  resize_window shorter 3

# ── 布局切换 ──────────────────────────────
map kitty_mod+l         next_layout

# ── Tab 管理 ──────────────────────────────
map kitty_mod+t         new_tab_with_cwd
map kitty_mod+q         close_tab
map ctrl+tab            next_tab
map ctrl+shift+tab      previous_tab
map kitty_mod+1         goto_tab 1
map kitty_mod+2         goto_tab 2
map kitty_mod+3         goto_tab 3
map kitty_mod+4         goto_tab 4
map kitty_mod+5         goto_tab 5

# ── 字体大小 ──────────────────────────────
map kitty_mod+equal     change_font_size all +1.0
map kitty_mod+minus     change_font_size all -1.0
map kitty_mod+0         change_font_size all 0

# ── 复制粘贴 ──────────────────────────────
map kitty_mod+c         copy_to_clipboard
map kitty_mod+v         paste_from_clipboard
map kitty_mod+alt+c     launch --allow-remote-control --cwd=current /home/ivey/.config/ncmpcpp/bin/cover-art toggle

# ── 滚动 ──────────────────────────────────
map kitty_mod+up        scroll_line_up
map kitty_mod+down      scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home      scroll_home
map kitty_mod+end       scroll_end
map kitty_mod+h         show_scrollback

# ── 搜索历史输出（需安装 fzf）──────────────
map kitty_mod+f2        launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i

# ── 透明度调节 ────────────────────────────
map kitty_mod+o>equal   set_background_opacity +0.05
map kitty_mod+o>minus   set_background_opacity -0.05
map kitty_mod+o>0       set_background_opacity 1.0

# ── 主题 & 配置 ───────────────────────────
map kitty_mod+i         kitten themes
map kitty_mod+F5        load_config_file


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# 保留系统标题栏用于拖动窗口，同时让它跟随 kitty 背景色
wayland_titlebar_color background
